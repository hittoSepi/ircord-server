syntax = "proto3";
package ircord;

// Server-visible envelope wrapper
message Envelope {
  uint64 seq           = 1;  // Monotonic counter for replay detection
  uint64 timestamp_ms  = 2;  // Unix epoch milliseconds
  MessageType type     = 3;  // Message type determines payload content
  bytes  payload       = 4;  // Type-dependent inner message (serialized)
}

enum MessageType {
  MT_UNKNOWN          = 0;

  // Connection handshake
  MT_HELLO            = 1;   // Client → Server: version negotiation
  MT_AUTH_CHALLENGE   = 2;   // Server → Client: nonce for signing
  MT_AUTH_RESPONSE    = 3;   // Client → Server: signed challenge
  MT_AUTH_OK          = 4;   // Server → Client: authentication successful
  MT_AUTH_FAIL        = 5;   // Server → Client: authentication failed

  // Chat relay (encrypted payload, server does not open)
  MT_CHAT_ENVELOPE    = 10;  // E2E encrypted chat message

  // Key distribution
  MT_KEY_UPLOAD       = 20;  // Client → Server: upload pre-keys
  MT_KEY_REQUEST      = 21;  // Client → Server: fetch user's key bundle
  MT_KEY_BUNDLE       = 22;  // Server → Client: key bundle response

  // Presence
  MT_PRESENCE         = 30;  // Presence updates (online/away/offline)

  // Voice signaling
  MT_VOICE_SIGNAL     = 40;  // ICE/SDP relay for WebRTC
  MT_VOICE_ROOM_JOIN  = 41;  // User joining a voice room
  MT_VOICE_ROOM_LEAVE = 42;  // User leaving a voice room
  MT_VOICE_ROOM_STATE = 43;  // Full participant list (sent to joiner)

  // Server management
  MT_INVITE           = 50;  // Invite code for server registration

  // Push notifications
  MT_FCM_TOKEN        = 70;   // Client → Server: register FCM token
  MT_FCM_UNREGISTER   = 71;   // Client → Server: unregister FCM token

  // Keepalive
  MT_PING             = 90;
  MT_PONG             = 91;

  // IRC Commands
  MT_COMMAND          = 60;   // Client → Server: IRC-style command
  MT_COMMAND_RESPONSE = 61;   // Server → Client: Command result
  MT_NICK_CHANGE      = 62;   // Server → Client: Nick change notification
  MT_USER_INFO        = 63;   // Server → Client: WHOIS response

  // File transfer
  MT_FILE_UPLOAD      = 80;   // Client → Server: Upload file chunk
  MT_FILE_DOWNLOAD    = 81;   // Client → Server: Request file download
  MT_FILE_CHUNK       = 82;   // Server → Client: File data chunk
  MT_FILE_PROGRESS    = 83;   // Server → Client: Upload/download progress
  MT_FILE_COMPLETE    = 84;   // Server → Client: Transfer complete
  MT_FILE_ERROR       = 85;   // Server → Client: Transfer error

  // Server messages
  MT_MOTD             = 75;   // Server → Client: Message of the Day

  // Errors
  MT_ERROR            = 99;
}

// Connection handshake messages

message Hello {
  uint32 protocol_version = 1;  // Current version: 1
  string client_version   = 2;  // Client identifier (e.g., "ircord-client/0.1.0")
}

message AuthChallenge {
  bytes nonce = 1;  // 32 random bytes for client to sign
}

message AuthResponse {
  string  user_id       = 1;  // Username or UUID
  bytes   identity_pub  = 2;  // Ed25519 public key (32 bytes)
  bytes   signature     = 3;  // Ed25519 sign(nonce || user_id)
  bytes   signed_prekey = 4;  // X25519 signed pre-key (first registration)
  bytes   spk_sig       = 5;  // Identity key signature over SPK
  string  password      = 6;  // Password for identity key recovery (optional)
}

// Key distribution messages

message KeyBundle {
  bytes  identity_pub       = 1;  // Ed25519 public key
  bytes  signed_prekey      = 2;  // X25519 signed pre-key
  bytes  spk_signature      = 3;  // sig(identity_priv, SPK)
  uint32 spk_id             = 4;
  bytes  one_time_prekey    = 5;  // X25519 one-time pre-key (removed after use)
  uint32 opk_id             = 6;
  string recipient_for      = 7;  // user_id whose bundle was requested (echoed by server)
}

message KeyUpload {
  bytes              signed_prekey     = 1;
  bytes              spk_signature     = 2;
  uint32             spk_id           = 3;
  repeated bytes     one_time_prekeys  = 4;
  repeated uint32    opk_ids          = 5;
}

message KeyRequest {
  string user_id = 1;  // Whose keys to fetch
}

// Chat relay (server only forwards, never decrypts)

message ChatEnvelope {
  string sender_id     = 1;
  string recipient_id  = 2;  // user_id or "#channel_name"
  bytes  ciphertext    = 3;  // Signal Protocol ciphertext
  uint32 ciphertext_type = 4; // WHISPER_MESSAGE=1, PRE_KEY_MESSAGE=3, SENDER_KEY=4
  bytes  skdm          = 5;  // SenderKeyDistributionMessage (type=4, first send only)
}

// Presence messages

message PresenceUpdate {
  string user_id = 1;
  enum Status {
    OFFLINE = 0;
    ONLINE  = 1;
    AWAY    = 2;
  }
  Status status = 2;
}

// Voice signaling messages

message VoiceSignal {
  string from_user       = 1;
  string to_user         = 2;   // or "#channel" for voice rooms
  enum SignalType {
    OFFER         = 0;
    ANSWER        = 1;
    ICE_CANDIDATE = 2;
    CALL_INVITE   = 3;
    CALL_ACCEPT   = 4;
    CALL_REJECT   = 5;
    CALL_HANGUP   = 6;
  }
  SignalType signal_type = 3;
  bytes      sdp_or_ice  = 4;   // JSON-serialized SDP or ICE candidate
}


// Voice room messages

message VoiceRoomJoin {
  string channel_id = 1;
  string user_id    = 2;
}

message VoiceRoomLeave {
  string channel_id = 1;
  string user_id    = 2;
}

message VoiceRoomState {
  string channel_id          = 1;
  repeated string participants = 2;
}

// Error message

message Error {
  uint32 code    = 1;
  string message = 2;
}

// Empty message for success responses with no payload

message Empty {
  // No fields - just indicates success
}

// IRC Command messages

message IrcCommand {
  string command = 1;    // Command name without leading /
  repeated string args = 2;  // Command arguments
}

message CommandResponse {
  bool success = 1;
  string message = 2;    // Human-readable response
  string command = 3;    // Echo back the command
}

message NickChange {
  string old_nick = 1;
  string new_nick = 2;
}

message UserInfo {
  string user_id = 1;
  string nickname = 2;
  bool is_online = 3;
  repeated string channels = 4;  // Channels user is in
  string identity_fingerprint = 5;
}

// Push notification messages

message FcmTokenRegistration {
  string token = 1;        // FCM registration token
  string platform = 2;     // "android", "ios", "web"
  string device_name = 3;  // Optional device identifier
}

message FcmUnregister {
  string token = 1;        // Token to unregister (or "all" for all devices)
}

// File transfer messages

message FileUploadRequest {
  string file_id = 1;          // Unique file ID (generated by client or server)
  string filename = 2;         // Original filename
  uint64 file_size = 3;        // Total file size in bytes
  string mime_type = 4;        // MIME type (e.g., "image/png")
  string recipient_id = 5;     // Target user (empty for channel upload)
  string channel_id = 6;       // Target channel (empty for DM)
  uint32 chunk_size = 7;       // Preferred chunk size (default 64KB)
}

message FileUploadChunk {
  string file_id = 1;          // File ID from upload request
  uint32 chunk_index = 2;      // Chunk number (0-based)
  bytes data = 3;              // Chunk data
  bool is_last = 4;            // True if this is the final chunk
  bytes checksum = 5;          // Optional: SHA-256 of this chunk
}

message FileDownloadRequest {
  string file_id = 1;          // File to download
  uint32 chunk_index = 2;      // Starting chunk (for resume)
}

message FileChunk {
  string file_id = 1;          // File ID
  uint32 chunk_index = 2;      // Chunk number
  bytes data = 3;              // Chunk data
  bool is_last = 4;            // True if this is the final chunk
}

message FileProgress {
  string file_id = 1;          // File being transferred
  uint64 bytes_transferred = 2;  // Bytes sent/received so far
  uint64 total_bytes = 3;      // Total file size
  float percent_complete = 4;  // 0.0 to 100.0
  string status = 5;           // "uploading", "downloading", "completed", "error"
}

message FileComplete {
  string file_id = 1;          // Completed file
  string file_url = 2;         // Optional: direct download URL (if HTTP enabled)
  uint64 total_bytes = 3;      // Final size
  bytes file_checksum = 4;     // SHA-256 of entire file
}

message FileError {
  string file_id = 1;          // File that failed
  uint32 error_code = 2;       // Error code
  string error_message = 3;    // Human-readable error
}

// File metadata (stored in database)
message FileMetadata {
  string file_id = 1;
  string filename = 2;
  uint64 file_size = 3;
  string mime_type = 4;
  string sender_id = 5;
  string recipient_id = 6;     // Empty if channel upload
  string channel_id = 7;       // Empty if DM
  int64 uploaded_at = 8;       // Unix timestamp
  int64 expires_at = 9;        // Expiration timestamp
  bytes file_checksum = 10;    // SHA-256 of file
  string storage_path = 11;    // Server storage location
}

// MOTD (Message of the Day) message
message MotdMessage {
  repeated string lines = 1;   // MOTD lines (split on newlines)
}
